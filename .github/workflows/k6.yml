name: k6

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  BASE_URL: https://quickpizza.grafana.com
  BROWSER_HEADLESS: 'true'
  RESULTS_DIR: results

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run typecheck
        run: pnpm typecheck

  api-smoke:
    name: API Smoke
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '1.7.1'

      - name: Run smoke suite
        run: pnpm test:smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: api-smoke-results
          path: results/*.json

  browser-smoke:
    name: Browser Smoke
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup k6 with browser support
        uses: grafana/setup-k6-action@v1
        with:
          browser: true
          k6-version: '1.7.1'

      - name: Run browser journey
        run: pnpm test:browser

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: browser-smoke-results
          path: results/*.json

  api-load:
    name: API Load
    if: github.event_name == 'workflow_dispatch'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '1.7.1'

      - name: Run restrained load suite
        run: pnpm test:load

      - name: Upload load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: api-load-results
          path: results/*.json
